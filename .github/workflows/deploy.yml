name: Deploy to Streamlit Community Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1단계: 코드 검증 ──────────────────────────────────────────────────────
  validate:
    name: 코드 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: config.py 생성
        run: cp config.example.py config.py

      - name: 문법 검사 (주요 파일)
        run: |
          python -m py_compile streamlit_app.py
          python -m py_compile pages/ipo.py
          python -m py_compile scheduler.py
          python -m py_compile modules/telegram_bot.py
          echo "✅ 문법 검사 통과"

      - name: 모듈 임포트 검사
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          import config
          from modules import data, technical, news, us_market
          print('✅ 모듈 임포트 정상')
          "
        env:
          PYTHONPATH: .

  # ── 2단계: 배포 알림 (main 브랜치 push 시) ────────────────────────────────
  notify:
    name: 배포 완료 알림
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 텔레그램 배포 알림
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_SHA=$(git log -1 --pretty=format:'%h')
          AUTHOR=$(git log -1 --pretty=format:'%an')
          MESSAGE="🚀 *Stock Analyzer 배포 완료*%0A%0A📝 ${COMMIT_MSG}%0A👤 ${AUTHOR}%0A🔖 \`${COMMIT_SHA}\`%0A%0A✅ Streamlit 앱 업데이트됨"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown" || echo "텔레그램 알림 전송 실패 (토큰 미설정)"
