name: Signal Check

on:
  schedule:   # 평일 KST 09:00~15:30 = UTC 00:00~06:30, 30분 간격
    - cron: '0  0 * * 1-5'
    - cron: '30 0 * * 1-5'
    - cron: '0  1 * * 1-5'
    - cron: '30 1 * * 1-5'
    - cron: '0  2 * * 1-5'
    - cron: '30 2 * * 1-5'
    - cron: '0  3 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0  4 * * 1-5'
    - cron: '30 4 * * 1-5'
    - cron: '0  5 * * 1-5'
    - cron: '30 5 * * 1-5'
    - cron: '0  6 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: config.py 생성
        run: cp config.example.py config.py

      - name: 신호 체크 실행
        run: python run_signals.py
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ALERT_CHANNEL: "telegram"
