name: Investor Pension Data

on:
  schedule:
    - cron: '40 7 * * 1-5'   # 16:40 KST (UTC+9) 평일 — 장 마감 후
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: config.py 생성
        run: cp config.example.py config.py

      - name: 연기금 데이터 수집
        run: python run_investor_pension.py
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
