name: 코인 자동매매 실행

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (all / buy / sell / balance)'
        default: 'all'
        required: false

jobs:
  run:
    name: coin-runner 실행
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: coin-runner 호출
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          URL="https://stock-analyzer-nu-brown.vercel.app/api/coin-runner?mode=${MODE}"
          echo "호출: ${URL}"
          RESP=$(curl -s -w "\n%{http_code}" "$URL")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(l) for l in d.get('logs',[])]" 2>/dev/null || echo "$BODY"
          [ "$HTTP_CODE" = "200" ] && echo "✅ 성공" || (echo "❌ 실패 (HTTP $HTTP_CODE)"; exit 1)
