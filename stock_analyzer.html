<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeLens — AI Trading Behavior Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:   #3D5AFE;
    --secondary: #EEF1FF;
    --bg:        #F5F6FA;
    --surface:   #FFFFFF;
    --text:      #111111;
    --muted:     #9EA3B0;
    --border:    #EBEBEB;
    --green:     #00C853;
    --red:       #FF1744;
    --radius:    12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .logo em { font-style: normal; color: var(--primary); }
  .header-stats { display: flex; gap: 28px; }
  .hstat { text-align: center; }
  .hstat-val { font-size: 18px; font-weight: 700; color: var(--primary); }
  .hstat-val.up { color: var(--green); }
  .hstat-val.dn { color: var(--red); }
  .hstat-label { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* MAIN */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 28px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* FORM */
  .input-card { grid-column: 1; grid-row: 1; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }

  label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 5px; }

  input, select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(61,90,254,0.08);
  }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  textarea { resize: vertical; min-height: 70px; line-height: 1.6; }

  .emotion-group { display: flex; gap: 7px; flex-wrap: wrap; }
  .emotion-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .emotion-btn:hover { border-color: var(--primary); color: var(--primary); }
  .emotion-btn.active {
    background: var(--secondary);
    border-color: var(--primary);
    color: var(--primary);
    font-weight: 600;
  }

  .btn-submit {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: var(--primary);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* TRADES LIST */
  .trades-card { grid-column: 2; grid-row: 1; }
  .trades-list { max-height: 360px; overflow-y: auto; scrollbar-width: none; }
  .trades-list::-webkit-scrollbar { display: none; }

  .trade-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    margin-bottom: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .trade-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .badge-buy  { background: rgba(0,200,83,0.12);  color: var(--green); border: 1px solid rgba(0,200,83,0.3); }
  .badge-sell { background: rgba(255,23,68,0.10); color: var(--red);   border: 1px solid rgba(255,23,68,0.25); }
  .trade-info { flex: 1; min-width: 0; }
  .trade-name   { font-size: 14px; font-weight: 600; }
  .trade-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .trade-reason { font-size: 12px; color: var(--primary); margin-top: 2px; }
  .trade-date   { font-size: 11px; color: var(--muted); flex-shrink: 0; text-align: right; }
  .trade-del {
    background: none; border: none;
    color: var(--border); cursor: pointer;
    font-size: 16px; line-height: 1;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  .trade-del:hover { color: var(--red); }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon  { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }
  .empty-state small { font-size: 12px; margin-top: 4px; display: block; }

  /* ANALYSIS */
  .analysis-card { grid-column: 1 / 3; grid-row: 2; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-val { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .stat-lbl { font-size: 12px; color: var(--muted); }
  .neutral { color: var(--primary); }
  .up      { color: var(--green); }
  .down    { color: var(--red); }

  .btn-analyze {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    background: var(--secondary);
    border: 2px solid var(--primary);
    border-radius: var(--radius);
    color: var(--primary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 20px;
  }
  .btn-analyze:hover { background: var(--primary); color: #fff; }
  .btn-analyze:active { transform: scale(0.98); }
  .btn-analyze:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .analysis-result {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    min-height: 120px;
    line-height: 1.8;
    font-size: 14px;
  }
  .analysis-result.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
  }
  .dots { display: inline-flex; gap: 5px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--primary);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40%           { transform: scale(1);   opacity: 1; }
  }

  .analysis-result h3 {
    color: var(--primary);
    font-size: 14px;
    font-weight: 700;
    margin: 16px 0 8px;
    padding-left: 10px;
    border-left: 3px solid var(--primary);
  }
  .analysis-result h3:first-child { margin-top: 0; }
  .analysis-result ul { padding-left: 20px; }
  .analysis-result li { margin-bottom: 5px; }
  .analysis-result strong { color: var(--primary); }

  .pulse {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,200,83,0.4); }
    50%       { box-shadow: 0 0 0 6px rgba(0,200,83,0); }
  }

  /* ── 탭 네비게이션 ── */
  .tab-nav {
    display: flex; gap: 8px;
    padding: 16px 40px 0;
    max-width: 1400px; margin: 0 auto;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 10px 22px; border: none; background: none; cursor: pointer;
    font-size: 14px; font-weight: 600; color: var(--muted);
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: color .2s, border-color .2s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* ── 대시보드 ── */
  .dash-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 20px; padding: 28px 40px; max-width: 1400px; margin: 0 auto;
  }
  .dash-full { grid-column: 1 / -1; }

  /* ── 캘린더 ── */
  .cal-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .cal-header h2 { font-size: 18px; font-weight: 700; }
  .cal-nav { background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display:flex;align-items:center;justify-content:center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 6px 0; text-transform: uppercase; }
  .cal-cell {
    min-height: 90px; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px; font-size: 11px; cursor: pointer;
    transition: background .15s; position: relative; overflow: hidden;
  }
  .cal-cell:hover { background: #f0f4ff; }
  .cal-cell.today { border-color: var(--primary); background: #eef1ff; }
  .cal-cell.other-month { opacity: .35; }
  .cal-cell.has-event { background: #f8fff8; }
  .cal-day { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .cal-day.sun { color: var(--red); }
  .cal-day.sat { color: #3D5AFE; }
  .cal-event {
    font-size: 10px; padding: 2px 5px; border-radius: 4px;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cal-event.briefing  { background: #dbeafe; color: #1e40af; }
  .cal-event.pick      { background: #d1fae5; color: #065f46; }
  .cal-event.signal    { background: #fef3c7; color: #92400e; }
  .cal-event.ipo-sub    { background: #ede9fe; color: #5b21b6; }
  .cal-event.ipo-list   { background: #fce7f3; color: #9d174d; font-weight: 700; }
  .cal-event.ipo-sub-done { background: #a7f3d0; color: #064e3b; font-weight: 700; }
  .cal-event.ipo-allot  { background: #fef9c3; color: #854d0e; font-weight: 700; border: 1px solid #fbbf24; }

  /* ── 날짜 상세 모달 ── */
  .day-modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
    z-index:1000; align-items:center; justify-content:center;
  }
  .day-modal-overlay.open { display:flex; }
  .day-modal {
    background:var(--surface); border-radius:16px; padding:28px;
    max-width:540px; width:92%; max-height:82vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .day-modal-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .day-modal-title { font-size:17px; font-weight:700; }
  .day-modal-close {
    background:none; border:none; cursor:pointer;
    font-size:20px; color:var(--muted); padding:4px 8px; border-radius:8px;
  }
  .day-modal-close:hover { background:var(--bg); }
  .day-modal-section { margin-bottom:16px; }
  .day-modal-section-title {
    font-size:12px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;
    padding-bottom:6px; border-bottom:1px solid var(--border);
  }
  .day-modal-ev {
    background:var(--bg); border-radius:10px; padding:12px 14px;
    margin-bottom:8px; font-size:13px; line-height:1.7;
  }

  /* ── 결과 목록 ── */
  .result-list { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; }
  .result-item {
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .result-item-header { display: flex; align-items: center; justify-content: space-between; }
  .result-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .result-badge.briefing { background: #dbeafe; color: #1e40af; }
  .result-badge.pick     { background: #d1fae5; color: #065f46; }
  .result-badge.signal   { background: #fef3c7; color: #92400e; }
  .result-stocks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .stock-chip {
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    background: var(--secondary); color: var(--primary);
    display: flex; align-items: center; gap: 4px;
  }
  .stock-chip .up { color: var(--green); }
  .stock-chip .dn { color: var(--red); }
  .empty-msg { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    main { grid-template-columns: 1fr; padding: 16px; }
    .trades-card  { grid-column: 1; grid-row: 2; }
    .analysis-card { grid-column: 1; grid-row: 3; }
    .header-stats { gap: 16px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .dash-grid { grid-template-columns: 1fr; padding: 16px; }
    .tab-nav { padding: 12px 16px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📈 Trade<em>Lens</em></div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="h-total">0</div>
      <div class="hstat-label">총 매매</div>
    </div>
    <div class="hstat">
      <div class="hstat-val up" id="h-buy">0</div>
      <div class="hstat-label">매수</div>
    </div>
    <div class="hstat">
      <div class="hstat-val dn" id="h-sell">0</div>
      <div class="hstat-label">매도</div>
    </div>
  </div>
</header>

<!-- 탭 네비게이션 -->
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('trades')">📋 매매기록</button>
  <button class="tab-btn" onclick="switchTab('dashboard')">📊 대시보드</button>
</nav>

<!-- 매매기록 탭 -->
<div id="tab-trades" class="tab-page active">
<main>

  <!-- INPUT CARD -->
  <div class="card input-card">
    <div class="card-title">✏️ 매매 기록 입력</div>

    <div class="form-row">
      <div>
        <label>날짜</label>
        <input type="date" id="inp-date">
      </div>
      <div>
        <label>종목명</label>
        <input type="text" id="inp-stock" placeholder="예: 삼성전자">
      </div>
    </div>

    <div class="form-row three">
      <div>
        <label>매수/매도</label>
        <select id="inp-type">
          <option value="매수">📗 매수</option>
          <option value="매도">📕 매도</option>
        </select>
      </div>
      <div>
        <label>가격 (원)</label>
        <input type="number" id="inp-price" placeholder="72000">
      </div>
      <div>
        <label>수량 (주)</label>
        <input type="number" id="inp-qty" placeholder="10">
      </div>
    </div>

    <div style="margin-bottom:10px">
      <label>매매 이유</label>
      <input type="text" id="inp-reason" placeholder="예: 52주 신저가 근처, 실적 발표 기대">
    </div>

    <div style="margin-bottom:16px">
      <label>당시 심리 상태</label>
      <div class="emotion-group" id="emotion-group">
        <button class="emotion-btn" onclick="toggleEmotion(this)">😤 확신</button>
        <button class="emotion-btn" onclick="toggleEmotion(this)">😰 불안</button>
        <button class="emotion-btn" onclick="toggleEmotion(this)">🤑 탐욕</button>
        <button class="emotion-btn" onclick="toggleEmotion(this)">😱 공포</button>
        <button class="emotion-btn" onclick="toggleEmotion(this)">🧘 평온</button>
        <button class="emotion-btn" onclick="toggleEmotion(this)">🎲 도박심리</button>
      </div>
    </div>

    <div>
      <label>추가 메모 (선택)</label>
      <textarea id="inp-memo" placeholder="시장 상황, 뉴스, 특이사항 등 자유롭게 기록해보세요..."></textarea>
    </div>

    <button class="btn-submit" onclick="addTrade()">+ 매매 기록 추가</button>
  </div>

  <!-- TRADES LIST -->
  <div class="card trades-card">
    <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>📋 매매 내역</span>
      <span id="trade-count" style="font-size:12px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:500">0건</span>
    </div>
    <div class="trades-list" id="trades-list">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>아직 매매 기록이 없어요</p>
        <small>왼쪽에서 기록을 추가해보세요!</small>
      </div>
    </div>
  </div>

  <!-- ANALYSIS -->
  <div class="card analysis-card">
    <div class="card-title">🧠 AI 성향 분석</div>

    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-box">
        <div class="stat-val neutral" id="s-total">0</div>
        <div class="stat-lbl">총 매매 횟수</div>
      </div>
      <div class="stat-box">
        <div class="stat-val up" id="s-buy">0</div>
        <div class="stat-lbl">매수 횟수</div>
      </div>
      <div class="stat-box">
        <div class="stat-val down" id="s-sell">0</div>
        <div class="stat-lbl">매도 횟수</div>
      </div>
      <div class="stat-box">
        <div class="stat-val neutral" id="s-stocks">0</div>
        <div class="stat-lbl">거래 종목 수</div>
      </div>
    </div>

    <button class="btn-analyze" id="analyze-btn" onclick="analyzeWithClaude()">
      <span>🤖</span> Claude AI 성향 분석 시작
    </button>

    <div class="analysis-result" id="analysis-result">
      <div style="color:var(--muted);text-align:center;padding:20px">
        <span class="pulse"></span>매매 기록을 추가한 후 AI 분석을 시작하세요
      </div>
    </div>
  </div>

</main>
</div><!-- /tab-trades -->

<!-- 대시보드 탭 -->
<div id="tab-dashboard" class="tab-page">
<div class="dash-grid">

  <!-- 캘린더 -->
  <div class="cal-wrap dash-full">
    <div class="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">&#8249;</button>
      <h2 id="cal-title"></h2>
      <button class="cal-nav" onclick="calMove(1)">&#8250;</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;font-size:11px">
      <span class="cal-event briefing" style="display:inline-block">📊 브리핑/추천</span>
      <span class="cal-event ipo-sub" style="display:inline-block">🏢 공모주 청약기간</span>
      <span class="cal-event ipo-sub-done" style="display:inline-block">✅ 청약완료</span>
      <span class="cal-event ipo-allot" style="display:inline-block">📬 배정 확인일</span>
      <span class="cal-event ipo-list" style="display:inline-block">🚀 상장일</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- 브리핑 히스토리 -->
  <div class="card">

<script>
const API_URL = "/api/analyze";
let trades = JSON.parse(localStorage.getItem('trades') || '[]');
let selectedEmotion = '';

document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];

function toggleEmotion(btn) {
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedEmotion = btn.textContent.trim();
}

function addTrade() {
  const date = document.getElementById('inp-date').value;
  const stock = document.getElementById('inp-stock').value.trim();
  const type = document.getElementById('inp-type').value;
  const price = document.getElementById('inp-price').value;
  const qty = document.getElementById('inp-qty').value;
  const reason = document.getElementById('inp-reason').value.trim();
  const memo = document.getElementById('inp-memo').value.trim();

  if (!date || !stock || !price || !qty) {
    alert('날짜, 종목명, 가격, 수량은 필수 입력 항목입니다!');
    return;
  }

  const trade = { date, stock, type, price: parseInt(price), qty: parseInt(qty), reason, emotion: selectedEmotion, memo, id: Date.now() };
  trades.push(trade);
  localStorage.setItem('trades', JSON.stringify(trades));

  renderTrades();
  updateStats();

  document.getElementById('inp-stock').value = '';
  document.getElementById('inp-price').value = '';
  document.getElementById('inp-qty').value = '';
  document.getElementById('inp-reason').value = '';
  document.getElementById('inp-memo').value = '';
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
  selectedEmotion = '';
}

function renderTrades() {
  const list = document.getElementById('trades-list');
  if (trades.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>아직 매매 기록이 없어요</p><small>왼쪽에서 기록을 추가해보세요!</small></div>`;
    return;
  }
  list.innerHTML = [...trades].reverse().map(t => `
    <div class="trade-item">
      <span class="trade-badge ${t.type === '매수' ? 'badge-buy' : 'badge-sell'}">${t.type}</span>
      <div class="trade-info">
        <div class="trade-name">${t.stock}</div>
        <div class="trade-detail">${t.price.toLocaleString()}원 × ${t.qty}주 = ${(t.price*t.qty).toLocaleString()}원${t.emotion ? ' · ' + t.emotion : ''}</div>
        ${t.reason ? `<div class="trade-reason">💬 ${t.reason}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <span class="trade-date">${t.date}</span>
        <button class="trade-del" onclick="deleteTrade(${t.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function deleteTrade(id) {
  trades = trades.filter(t => t.id !== id);
  localStorage.setItem('trades', JSON.stringify(trades));
  renderTrades();
  updateStats();
}

function updateStats() {
  const total = trades.length;
  const buys = trades.filter(t => t.type === '매수').length;
  const sells = trades.filter(t => t.type === '매도').length;
  const stocks = [...new Set(trades.map(t => t.stock))].length;

  document.getElementById('h-total').textContent = total;
  document.getElementById('h-buy').textContent = buys;
  document.getElementById('h-sell').textContent = sells;
  document.getElementById('trade-count').textContent = total + '건';
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-buy').textContent = buys;
  document.getElementById('s-sell').textContent = sells;
  document.getElementById('s-stocks').textContent = stocks;

  if (total > 0) document.getElementById('stats-row').style.display = 'grid';
}

async function analyzeWithClaude() {
  if (trades.length === 0) {
    alert('먼저 매매 기록을 입력해주세요!');
    return;
  }

  const btn = document.getElementById('analyze-btn');
  const result = document.getElementById('analysis-result');
  btn.disabled = true;
  btn.innerHTML = '⏳ 분석 중...';

  result.className = 'analysis-result loading';
  result.innerHTML = `분석 중입니다 <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

  const summary = trades.map(t =>
    `[${t.date}] ${t.stock} ${t.type} | 가격: ${t.price.toLocaleString()}원 | 수량: ${t.qty}주 | 이유: ${t.reason || '없음'} | 심리: ${t.emotion || '미입력'} | 메모: ${t.memo || '없음'}`
  ).join('\n');

  const prompt = `다음은 사용자의 주식 매매 기록입니다:\n\n${summary}\n\n위 매매 기록을 분석하여 다음 항목을 한국어로 리포팅해주세요:\n\n1. **매매 성향 유형** (예: 단기 스캘퍼, 중기 스윙트레이더, 장기 가치투자자 등)\n2. **주요 매매 패턴** (자주 나타나는 행동 패턴 3가지)\n3. **심리적 특성** (감정이 매매에 미치는 영향)\n4. **강점** (잘 하고 있는 부분)\n5. **개선이 필요한 부분** (주의해야 할 습관)\n6. **맞춤 전략 제안** (성향에 맞는 투자 전략 2-3가지)\n\n각 항목을 h3 태그로 구분하고, 구체적이고 통찰력 있게 분석해주세요. 데이터가 적더라도 가능한 패턴을 찾아 분석해주세요.`;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '분석 결과를 가져오지 못했습니다.';

    result.className = 'analysis-result';
    result.innerHTML = text
      .replace(/### (.*)/g, '<h3>$1</h3>')
      .replace(/## (.*)/g, '<h3>$1</h3>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.*)/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');

  } catch (e) {
    result.className = 'analysis-result';
    result.innerHTML = `<div style="color:var(--red)">⚠️ 분석 중 오류가 발생했습니다.<br><small style="color:var(--muted)">${e.message}</small></div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '<span>🤖</span> Claude AI 성향 분석 시작';
}

renderTrades();
updateStats();

async function initDashboard() {
  if (_dashData) { renderDashboard(_dashData); return; }
  try {
    const r = await fetch('/api/data');
    if (!r.ok) throw new Error('API 오류');
    _dashData = await r.json();

    _dashData = { briefing: [], picks: [], signals: [] };
    console.warn('대시보드 데이터 로드 실패:', e.message);

}

}

// ══════════════════════════════════════════════════════════
// 캘린더
// ══════════════════════════════════════════════════════════
let _calYear  = new Date().getFullYear();
let _calMonth = new Date().getMonth();

function calMove(dir) {
  _calMonth += dir;
  if (_calMonth > 11) { _calMonth = 0; _calYear++; }
  if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
  renderCalendar(_dashData || {});
}

function calcAllotDate(dateSubEnd) {
  // 청약 마감 + 2 영업일 (로컬 시간 기준으로 파싱)
  try {
    let d = new Date(dateSubEnd + 'T00:00:00');
    let bdays = 0;
    while (bdays < 2) {
      d.setDate(d.getDate() + 1);
      if (d.getDay() !== 0 && d.getDay() !== 6) bdays++;
    }
    const y = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const dy = String(d.getDate()).padStart(2,'0');
    return `${y}-${mo}-${dy}`;
  } catch(_) { return ''; }
}

function renderCalendar(data) {
  const DOWS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const today = new Date();
  const y = _calYear, m = _calMonth;
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  document.getElementById('cal-title').textContent = `${y}년 ${monthNames[m]}`;

  // 이벤트 인덱스 (날짜 → 배열)
  const events = {};
  const add = (date, type, text, detail = null) => {
    if (!date) return;
    if (!events[date]) events[date] = [];
    events[date].push({ type, text, detail });
  };

  (data.briefing || []).forEach(b => add(b.date, 'briefing', `📊 브리핑 (${(b.stocks||[]).length}종목)`, b));
  (data.picks    || []).forEach(p => add(p.date, 'pick',     `🎯 추천 (${(p.picks||[]).length}종목)`, p));
  (data.signals  || []).forEach(s => add(s.date, 'signal',   `📡 ${s.name} ${s.alerts?.[0]?.substring(0,10)||''}`, s));

  // 공모주 청약일 / 상장일 (로컬 시간 기준 날짜 파싱)
  (data.ipo || []).forEach(ipo => {
    const name = ipo.name || '';
    const subscribed = ipo.subscribed;
    const status = ipo.status || '';

    // 청약 기간 (시작~마감 전체 날짜에 표시)
    if (ipo.date_sub_start && ipo.date_sub_end) {
      let cur = new Date(ipo.date_sub_start + 'T00:00:00');
      const end = new Date(ipo.date_sub_end + 'T00:00:00');
      while (cur <= end) {
        const cy = cur.getFullYear();
        const cm = String(cur.getMonth()+1).padStart(2,'0');
        const cd = String(cur.getDate()).padStart(2,'0');
        const key = `${cy}-${cm}-${cd}`;
        if (subscribed) {
          add(key, 'ipo-sub-done', `✅ ${name} 청약완료`, ipo);
        } else if (!['상장완료','청약포기'].includes(status)) {
          add(key, 'ipo-sub', `🏢 ${name} 청약`, ipo);
        }
        cur.setDate(cur.getDate() + 1);
      }
    }

    // 배정일 (청약 완료 + 배정주수 미입력)
    if (subscribed && ipo.date_sub_end) {
      const allotDate = ipo.date_allot || calcAllotDate(ipo.date_sub_end);
      const hasAlloc  = ipo.shares_alloc && ipo.shares_alloc > 0;
      if (allotDate && !hasAlloc && status !== '청약포기') {
        add(allotDate, 'ipo-allot', `📬 ${name} 배정확인`, ipo);
      }
    }

    // 상장일 — 배정 확정된 항목만 강조
    const hasAlloc = ipo.shares_alloc && ipo.shares_alloc > 0;
    if (ipo.date_list && subscribed && hasAlloc) {
      add(ipo.date_list, 'ipo-list', `🚀 ${name} 상장일 (${ipo.shares_alloc}주)`, ipo);
    } else if (ipo.date_list && !subscribed && !['청약포기'].includes(status)) {
      add(ipo.date_list, 'ipo-list', `📋 ${name} 상장`, ipo);
    }
  });

  // 스케줄 (평일 고정 이벤트)
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(y, m, d);
    const dow = dt.getDay();
    const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (dow >= 1 && dow <= 5) { // 평일
      if (!events[key]) events[key] = [];
      events[key].unshift({ type: 'briefing', text: '⏰ 07:30 브리핑', detail: null });
      events[key].push({ type: 'pick', text: '⏰ 08:50 매수추천', detail: null });
    }
  }

  // 전역 이벤트 저장 (클릭 상세보기용)
  _calEvents = events;

  // 그리기
  const grid = document.getElementById('cal-grid');
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();

  let html = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // 이전달 빈 칸
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-cell other-month"><div class="cal-day">${prevLast - i}</div></div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    const dt = new Date(y, m, d);
    const dow = dt.getDay();
    const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = y === today.getFullYear() && m === today.getMonth() && d === today.getDate();
    const evs = events[key] || [];
    const hasReal = evs.some(e => !e.text.startsWith('⏰'));

    html += `<div class="cal-cell${isToday ? ' today' : ''}${hasReal ? ' has-event' : ''}" onclick="showDayDetail('${key}')">
      <div class="cal-day${dow===0?' sun':dow===6?' sat':''}">${d}</div>
      ${evs.slice(0,3).map(e => `<div class="cal-event ${e.type}">${e.text}</div>`).join('')}
      ${evs.length > 3 ? `<div style="font-size:10px;color:var(--muted)">+${evs.length-3}개</div>` : ''}
    </div>`;
  }

  // 다음달 빈 칸
  const total = firstDay + lastDate;
  const remain = (7 - (total % 7)) % 7;
  for (let d = 1; d <= remain; d++) {
    html += `<div class="cal-cell other-month"><div class="cal-day">${d}</div></div>`;
  }

  grid.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
// 날짜 상세 모달
// ══════════════════════════════════════════════════════════
let _calEvents = {};

function showDayDetail(key) {
  const allEvs = _calEvents[key] || [];
  if (!allEvs.length) return;
  const evs = allEvs.filter(e => !e.text.startsWith('⏰'));
  const schedEvs = allEvs.filter(e => e.text.startsWith('⏰'));

  const [y, mo, d] = key.split('-');
  document.getElementById('day-modal-title').textContent =
    `${y}년 ${parseInt(mo)}월 ${parseInt(d)}일`;

  let html = '';

  // 브리핑
  const briefings = evs.filter(e => e.type === 'briefing' && e.detail);
  if (briefings.length) {
    html += `<div class="day-modal-section"><div class="day-modal-section-title">📊 브리핑</div>`;
    briefings.forEach(ev => {
      const b = ev.detail;
      html += `<div class="day-modal-ev">`;
      (b.stocks || []).forEach(s => {
        const cc = (s.chg_pct||0) >= 0 ? 'var(--green)' : 'var(--red)';
        const ar = (s.chg_pct||0) >= 0 ? '▲' : '▼';
        html += `<div style="display:flex;align-items:center;justify-content:space-between;
          padding:4px 0;border-bottom:1px solid var(--border)">
          <span style="font-weight:600">${s.name||s.code||''}</span>
          <span>${(s.price||0).toLocaleString()}원
            <span style="color:${cc}">${ar}${Math.abs(s.chg_pct||0).toFixed(2)}%</span>
          </span></div>`;
        (s.alerts||[]).forEach(a => {
          html += `<div style="font-size:11px;color:var(--muted);padding-left:8px">• ${a}</div>`;
        });
      });
      if (!(b.stocks||[]).length) html += `<div style="color:var(--muted)">종목 데이터 없음</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  // 매수 추천
  const picks = evs.filter(e => e.type === 'pick' && e.detail);
  if (picks.length) {
    html += `<div class="day-modal-section"><div class="day-modal-section-title">🎯 매수 추천</div>`;
    picks.forEach(ev => {
      const p = ev.detail;
      html += `<div class="day-modal-ev">`;
      (p.picks || []).forEach(s => {
        html += `<div style="display:flex;align-items:flex-start;justify-content:space-between;
          padding:4px 0;border-bottom:1px solid var(--border);gap:8px">
          <span style="font-weight:600;flex-shrink:0">${s.name||s.code||''}</span>
          <span style="font-size:12px;color:var(--muted);text-align:right">${s.reason||''}</span>
        </div>`;
      });
      if (!(p.picks||[]).length) html += `<div style="color:var(--muted)">추천 데이터 없음</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  // 신호 알림
  const signals = evs.filter(e => e.type === 'signal' && e.detail);
  if (signals.length) {
    html += `<div class="day-modal-section"><div class="day-modal-section-title">📡 신호 알림</div>`;
    signals.forEach(ev => {
      const s = ev.detail;
      const cc = (s.chg_pct||0) >= 0 ? 'var(--green)' : 'var(--red)';
      const ar = (s.chg_pct||0) >= 0 ? '▲' : '▼';
      html += `<div class="day-modal-ev">
        <div style="font-weight:600;margin-bottom:4px">${s.name||''}</div>
        ${(s.alerts||[]).map(a=>`<div style="font-size:12px">• ${a}</div>`).join('')}
        <div style="font-size:11px;color:var(--muted);margin-top:4px">
          ${(s.price||0).toLocaleString()}원
          <span style="color:${cc}">${ar}${Math.abs(s.chg_pct||0).toFixed(2)}%</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // 공모주
  const ipoEvs = evs.filter(e => e.type.startsWith('ipo') && e.detail);
  if (ipoEvs.length) {
    html += `<div class="day-modal-section"><div class="day-modal-section-title">🏢 공모주</div>`;
    const typeLabel = {
      'ipo-sub':'청약기간','ipo-sub-done':'청약완료',
      'ipo-allot':'배정확인일','ipo-list':'상장일'
    };
    ipoEvs.forEach(ev => {
      const ipo = ev.detail;
      html += `<div class="day-modal-ev">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-weight:700">${ipo.name||''}</span>
          <span class="cal-event ${ev.type}" style="display:inline-block">${typeLabel[ev.type]||ev.type}</span>
        </div>
        <div style="font-size:12px;color:var(--muted)">
          공모가: <strong>${(ipo.price_ipo||0).toLocaleString()}원</strong>
          ${ipo.date_sub_start ? ` · 청약: ${ipo.date_sub_start}~${ipo.date_sub_end||''}` : ''}
          ${ipo.date_list ? ` · 상장: ${ipo.date_list}` : ''}
          ${ipo.broker ? ` · ${ipo.broker}` : ''}
        </div>
        ${(ipo.shares_alloc||0) > 0
          ? `<div style="font-size:12px;margin-top:4px;color:var(--green);font-weight:600">배정: ${ipo.shares_alloc}주</div>` : ''}
        ${ipo.score !== undefined
          ? `<div style="font-size:12px;margin-top:4px">추천점수: <strong>${ipo.score}점</strong></div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  if (!html) {
    if (schedEvs.length) {
      html = `<div class="day-modal-section">
        <div class="day-modal-section-title">📅 예정 스케줄</div>
        ${schedEvs.map(e => `<div class="day-modal-ev" style="display:flex;align-items:center;gap:8px">
          <span style="font-size:18px">⏰</span>
          <div>
            <div style="font-weight:600">${e.text.replace('⏰ ','')}</div>
            <div style="font-size:12px;color:var(--muted)">GitHub Actions 실행 후 실제 데이터가 표시됩니다</div>
          </div>
        </div>`).join('')}
      </div>`;
    } else {
      html = `<div class="day-modal-ev" style="color:var(--muted);text-align:center">상세 데이터가 없습니다</div>`;
    }
  }

  document.getElementById('day-modal-body').innerHTML = html;
  document.getElementById('day-modal-overlay').classList.add('open');
}

function closeModal(evt) {
  if (evt && evt.target !== document.getElementById('day-modal-overlay')) return;
  document.getElementById('day-modal-overlay').classList.remove('open');
}
</script>

<!-- 날짜 상세 모달 -->
<div class="day-modal-overlay" id="day-modal-overlay" onclick="closeModal(event)">
  <div class="day-modal" id="day-modal">
    <div class="day-modal-header">
      <div class="day-modal-title" id="day-modal-title"></div>
      <button class="day-modal-close" onclick="document.getElementById('day-modal-overlay').classList.remove('open')">✕</button>
    </div>
    <div id="day-modal-body"></div>
  </div>
</div>
